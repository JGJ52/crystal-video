version: "3.9"

services:
  app:
    image: jgj52/crystal-video:latest
    container_name: crystal
    ports:
      - "3004:3000"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./videos:/crystal/videos
      - ./.env:/crystal/.env
    networks:
      - crystal_nw

  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - crystal_nw

networks:
  crystal_nw: